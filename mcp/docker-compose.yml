services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      mcp-net:
        ipv4_address: 172.28.0.5
    restart: unless-stopped

  gateway:
    build: ./gateway
    environment:
      GATEWAY_CONFIG: /app/config.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./gateway/config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/healthz', timeout=2).status == 200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      tavily:
        condition: service_started
    networks:
      mcp-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  tavily:
    build: ./servers/tavily
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      mcp-net:
        ipv4_address: 172.28.0.20
    restart: unless-stopped

networks:
  mcp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
