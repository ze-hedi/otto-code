<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workflow Builder — Otto</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Workflow styles -->
  <link rel="stylesheet" href="../static/css/workflows.css" />
</head>
<body>

<div class="wf-shell">

  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <header class="wf-topbar">
    <a href="index.html" class="brand">
      <i class="bi bi-robot"></i>
      <span>Otto</span>
    </a>
    <span class="badge-page">Workflow Builder</span>

    <div class="topbar-actions">
      <button class="tb-btn" id="wf-connect-btn" title="Toggle connection mode (drag between node handles)">
        <i class="bi bi-bezier2"></i>
        <span>Connect</span>
      </button>
      <button class="tb-btn" id="wf-undo-btn" title="Undo last action (Ctrl+Z)" disabled>
        <i class="bi bi-arrow-counterclockwise"></i>
        <span>Undo</span>
      </button>
      <button class="tb-btn" id="wf-export-btn" title="Export schema as JSON">
        <i class="bi bi-download"></i>
        <span>Export</span>
      </button>
      <button class="tb-btn" id="wf-upload-btn" title="Upload workflow JSON">
        <i class="bi bi-upload"></i>
        <span>Upload</span>
      </button>
      <input type="file" id="wf-upload-input" accept=".json,application/json" style="display:none" />
      <button class="tb-btn" id="wf-clear-btn" title="Clear canvas">
        <i class="bi bi-trash3"></i>
        <span>Clear</span>
      </button>
    </div>
  </header>

  <!-- ── Body ─────────────────────────────────────────────────── -->
  <div class="wf-body">

    <!-- ── Component palette ──────────────────────────────────── -->
    <aside class="wf-sidebar">
      <div class="wf-sidebar-header">Components</div>
      <div class="wf-palette">

        <div class="wf-category">
          <div class="wf-category-title">Frontend</div>
          <div class="wf-component" draggable="true" data-type="web-app">
            <div class="wf-component-icon">🌐</div>
            <span>Web App</span>
          </div>
          <div class="wf-component" draggable="true" data-type="mobile-app">
            <div class="wf-component-icon">📱</div>
            <span>Mobile App</span>
          </div>
          <div class="wf-component" draggable="true" data-type="spa">
            <div class="wf-component-icon">⚛️</div>
            <span>SPA</span>
          </div>
        </div>

        <div class="wf-category">
          <div class="wf-category-title">Backend</div>
          <div class="wf-component" draggable="true" data-type="api">
            <div class="wf-component-icon">🔌</div>
            <span>REST API</span>
          </div>
          <div class="wf-component" draggable="true" data-type="microservice">
            <div class="wf-component-icon">🧩</div>
            <span>Microservice</span>
          </div>
          <div class="wf-component" draggable="true" data-type="server">
            <div class="wf-component-icon">🖥️</div>
            <span>Server</span>
          </div>
          <div class="wf-component" draggable="true" data-type="lambda">
            <div class="wf-component-icon">⚡</div>
            <span>Lambda</span>
          </div>
        </div>

        <div class="wf-category">
          <div class="wf-category-title">Data</div>
          <div class="wf-component" draggable="true" data-type="database">
            <div class="wf-component-icon">🗄️</div>
            <span>Database</span>
          </div>
          <div class="wf-component" draggable="true" data-type="cache">
            <div class="wf-component-icon">💾</div>
            <span>Cache</span>
          </div>
          <div class="wf-component" draggable="true" data-type="queue">
            <div class="wf-component-icon">📬</div>
            <span>Message Queue</span>
          </div>
        </div>

        <div class="wf-category">
          <div class="wf-category-title">Infrastructure</div>
          <div class="wf-component" draggable="true" data-type="load-balancer">
            <div class="wf-component-icon">⚖️</div>
            <span>Load Balancer</span>
          </div>
          <div class="wf-component" draggable="true" data-type="cdn">
            <div class="wf-component-icon">🌍</div>
            <span>CDN</span>
          </div>
          <div class="wf-component" draggable="true" data-type="firewall">
            <div class="wf-component-icon">🛡️</div>
            <span>Firewall</span>
          </div>
        </div>

      </div><!-- /wf-palette -->
    </aside>

    <!-- ── Canvas ─────────────────────────────────────────────── -->
    <div class="wf-canvas" id="wf-canvas">
      <div class="wf-grid"></div>
      <svg class="wf-svg" id="wf-svg"></svg>
      <div class="wf-drop-zone" id="wf-drop-zone"></div>

      <!-- Empty state -->
      <div class="wf-empty-hint" id="wf-empty-hint">
        <i class="bi bi-diagram-3"></i>
        <span>Drag components from the left to start</span>
      </div>
    </div>

  </div><!-- /wf-body -->
</div><!-- /wf-shell -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Workflow logic -->
<script src="../static/js/workflows.js"></script>
</body>
</html>
